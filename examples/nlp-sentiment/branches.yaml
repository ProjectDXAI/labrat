# labrat: NLP Sentiment Classification
#
# Converted from GPT-5.4 Pro research tree design.
# Source: 7 branches, 10 referenced papers (2025-2026), scoring formula included.
#
# The frontier model produced ~3000 words of prose with branch descriptions,
# search spaces, dead ends, and interactions. This YAML is the structured
# encoding of that output.

production_baseline:
  experiment_id: "bert_base_v1"
  description: "Fine-tuned BERT-base-uncased, accuracy 87%, F1 0.82, 50K tickets"
  config:
    model:
      type: "bert-base-uncased"
      max_length: 128
    training:
      epochs: 3
      batch_size: 32
      learning_rate: 2e-5
      warmup_ratio: 0.1
      loss: "cross_entropy"
      label_smoothing: 0.0
    data:
      dataset: "support_tickets_50k"
      augmentation: "none"
      context: "subject_body"
      metadata: "none"
      retrieval: "none"
    pretraining:
      enabled: false
      epochs: 0
    calibration:
      method: "none"
    efficiency:
      quantization: "fp32"
      serving: "single_encoder"

# Scoring formula from GPT-5.4 Pro (hard latency gate + weighted composite)
scoring:
  hard_gate: "p95_latency_ms <= 100 on batch=1"
  formula: "0.20 * Accuracy + 0.40 * MacroF1 + 0.25 * Calibration + 0.15 * LatencyScore"
  calibration_formula: "0.6 * (1 - min(ECE, 0.10)/0.10) + 0.4 * (1 - min(Brier, 0.25)/0.25)"
  latency_formula: "1.0 if p95 <= 100ms, else exp(-(p95-100)/40)"
  side_metrics:
    - "negative/frustrated-ticket F1"
    - "NLL"
    - "AURC / risk-coverage"
    - "predictive set size"
    - "QWK (if ordinal)"

branches:
  # ===== Branch 1: Modern Encoder Backbone =====
  # Source: ModernBERT, NeoBERT, RexBERT, Clinical ModernBERT papers
  # GPT-5.4 Pro confidence: HIGH (cleanest first branch)
  backbone:
    description: "Modern encoder replacement + light domain adaptation (Chen et al. 2025, ModernBERT, NeoBERT)"
    initial_budget: 30
    search_space:
      - delta_key: "model.type"
        values: ["answerdotai/ModernBERT-base", "NeoBERT-base", "roberta-base", "distilbert-base-uncased"]
      - delta_key: "model.max_length"
        values: [256, 512, 1024]
        note: "Match to real ticket-length histogram, not arbitrary truncation"
      - delta_key: "pretraining.enabled"
        values: [true]
        note: "Short continued MLM on unlabeled tickets (within 8h budget)"
      - delta_key: "pretraining.epochs"
        values: [1, 3]
      - delta_key: "training.loss"
        values: ["focal_loss", "contrastive_ce"]

  # ===== Branch 2: Task / Label Redesign =====
  # Source: TickIt, PRAISE, SemEval-2025 Task 11, EMNLP 2025 ordinal classification
  # GPT-5.4 Pro insight: "sentiment may be too small a target"
  task_design:
    description: "Label space and target redesign (TickIt, PRAISE, SemEval-2025)"
    initial_budget: 20
    search_space:
      - delta_key: "data.label_space"
        values: ["3_class", "5_ordinal", "sentiment_plus_intensity", "sentiment_plus_escalation"]
      - delta_key: "data.granularity"
        values: ["full_ticket", "latest_customer_turn"]
      - delta_key: "training.loss"
        values: ["ordinal_loss", "multitask_loss", "pairwise_ranking"]

  # ===== Branch 3: Context, Metadata, and Retrieval =====
  # Source: TickIt, BTZSC, IT-ticket prioritization
  # GPT-5.4 Pro: "probably the highest-value adjacent branch after backbone"
  context_retrieval:
    description: "Context enrichment + metadata + similar-ticket retrieval (TickIt, BTZSC)"
    initial_budget: 25
    search_space:
      - delta_key: "data.context"
        values: ["subject_body", "full_thread", "latest_turn_plus_summary"]
      - delta_key: "data.metadata"
        values: ["none", "product_queue_tier", "all_structured_fields"]
      - delta_key: "data.retrieval"
        values: ["none", "top_k_similar_tickets", "label_description_reranking"]
      - delta_key: "model.architecture"
        values: ["single_encoder", "dual_encoder_retrieval_mlp"]
      - delta_key: "data.serving_policy"
        values: ["always_on", "confidence_gated"]

  # ===== Branch 4: Data-Centric Improvement =====
  # Source: TDRANKER, Delora, Active Few-Shot, DALL, SupCL-GSS
  # GPT-5.4 Pro: "fix the right examples, not more random annotation"
  data_quality:
    description: "Noise detection, relabeling, augmentation, weak supervision (TDRANKER, Delora, DALL)"
    initial_budget: 20
    search_space:
      - delta_key: "data.audit_policy"
        values: ["high_loss", "ensemble_disagreement", "minority_class_first"]
      - delta_key: "data.relabel_budget"
        values: [500, 2000, 5000]
        note: "Number of suspicious tickets to relabel"
      - delta_key: "data.augmentation"
        values: ["paraphrase", "counterfactual_flips", "hard_negatives"]
      - delta_key: "data.weak_supervision"
        values: ["none", "labeling_rules", "dall_style"]

  # ===== Branch 5: Distillation and Teacher-Student =====
  # Source: Targeted Distillation for SA, COMPEFFDIST, PRAISE
  # GPT-5.4 Pro: "use richer models as teachers, not as your online path"
  distillation:
    description: "Teacher-student distillation (Targeted Distillation SA, COMPEFFDIST, PRAISE)"
    initial_budget: 15
    search_space:
      - delta_key: "distillation.teacher"
        values: ["encoder_ensemble", "offline_llm"]
      - delta_key: "distillation.target"
        values: ["soft_logits", "pairwise_margins", "nl_strategies"]
      - delta_key: "distillation.subset"
        values: ["hard_10k", "balanced_25k", "full_50k"]
      - delta_key: "distillation.deployment"
        values: ["student_only", "student_plus_fallback"]

  # ===== Branch 6: Calibration and Abstention =====
  # Source: JUCAL, UnLLM, Label Length Bias, First-Token Uncertainty
  # GPT-5.4 Pro: "make this first-class, not an afterthought"
  calibration:
    description: "Calibration, abstention, OOD robustness (JUCAL, UnLLM)"
    initial_budget: 15
    search_space:
      - delta_key: "calibration.method"
        values: ["temperature_scaling", "vector_scaling", "jucal_3_seeds"]
      - delta_key: "calibration.reject_option"
        values: ["none", "abstain_threshold", "conformal_set"]
      - delta_key: "calibration.fallback"
        values: ["human_review", "reranker", "heavy_model"]
      - delta_key: "calibration.ood_regime"
        values: ["none", "leave_one_queue_out", "new_product_holdout"]

  # ===== Branch 7: Inference Architecture =====
  # Source: Cost-Aware Model Selection, BTZSC, EMNLP 2025 gen-vs-disc
  # GPT-5.4 Pro: "encoder p50 latency 98-147ms vs LLM 326-1394ms"
  serving:
    description: "Serving topology, quantization, cascades (Cost-Aware Selection, BTZSC)"
    initial_budget: 10
    search_space:
      - delta_key: "efficiency.serving"
        values: ["single_encoder", "small_large_cascade", "encoder_plus_reranker"]
      - delta_key: "efficiency.quantization"
        values: ["fp16", "int8", "onnx_tensorrt"]
      - delta_key: "efficiency.retrieval_policy"
        values: ["always_off", "confidence_gated"]

  # ===== Capstone: Cross-Branch Combinations =====
  capstone:
    description: "Combined configs from branch winners"
    initial_budget: 20
    search_space:
      - delta_key: "combined"
        values:
          - name: "all_winners"
            description: "Best backbone + best context + best data cleaning + distillation + calibration"
            config_overrides: {}
          - name: "minimal_production"
            description: "Best backbone + int8 + confidence-gated retrieval (latency-first)"
            config_overrides: {}

# Budget allocation rationale (from GPT-5.4 Pro recommended sequence):
# 1. backbone (30) -- "cleanest first branch", highest expected ROI
# 2. context_retrieval (25) -- "highest-value adjacent branch"
# 3. task_design (20) + data_quality (20) -- parallel exploration
# 4. distillation (15) + calibration (15) -- second wave
# 5. serving (10) -- final optimization
# 6. capstone (20) -- combine winners

budget_rules:
  replenish_every_n_cycles: 10
  base_replenish: 5
  improvement_bonus: 3
  max_stale_cycles: 10

# Branch interaction notes (from GPT-5.4 Pro):
# - backbone x context: better long-context encoders make thread history usable
# - context x distillation: rich context is expensive online but ideal to distill
# - data_quality x calibration: noise audit before calibration sweep
# - task_design x calibration: richer targets surface genuine ambiguity
# - calibration x serving: calibrated uncertainty enables smart routing
# - augmentation should happen AFTER noise pass (don't amplify mislabels)
