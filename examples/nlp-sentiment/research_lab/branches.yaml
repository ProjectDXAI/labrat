mission: "Maximize macro F1 on a small five-class sentiment corpus using CPU-only sklearn models while preserving a stable held-out selection signal."

production_baseline:
  experiment_id: "baseline_logreg_unigram"
  description: "Word unigram TF-IDF with logistic regression."
  resource_class: "cpu"
  config:
    data:
      dataset_path: "data/sentiment_toy.jsonl"
      text_key: "text"
      label_key: "label"
      split_key: "split"
    features:
      word_ngram_max: 1
      char_ngrams: false
      char_ngram_max: 4
      max_features: 800
      min_df: 1
    model:
      type: "logreg"
      C: 1.0
      alpha: 0.7
      class_weight: null
    calibration:
      enabled: false
      method: "sigmoid"
    training:
      seed: 1337
  seed_metrics:
    search_eval: 0.48
    selection_eval: 0.46
    final_eval: 0.45

families:
  text_representation:
    description: "Cheap orthogonal probes over word and character TF-IDF choices."
    scientific_rationale: "The smallest reliable jump on tiny sentiment corpora often comes from representation choice before classifier changes."
    decisive_challenge_claim: "If this family is real, it should improve the mixed-signal holdout where wording and boundary phrases matter more than raw classifier margin."
    resource_class: "cpu"
    funding:
      initial_credits: 6
    cheap_probes:
      - name: "bigrams"
        description: "Test whether adding word bigrams lifts the fixed-split search score."
        config_patch:
          features:
            word_ngram_max: 2
      - name: "char_mix"
        description: "Add character n-grams for misspelling tolerance."
        config_patch:
          features:
            char_ngrams: true
            char_ngram_max: 5
    mutation_policy:
      axes:
        - path: "features.max_features"
          values: [600, 1200, 2000]
        - path: "features.min_df"
          values: [1, 2]
    crossover_policy:
      enabled: false
      compatible_families: []
      config_patch: {}
    audit:
      invalid_fast_margin: 0.03
      near_miss_margin: 0.015
    frame_break:
      plateau_window: 3
      min_remaining_probes: 0

  classifier_search:
    description: "Classifier family over logistic regression, linear SVM, and multinomial Naive Bayes."
    scientific_rationale: "Once the text representation is decent, the best cheap gains often come from margin shape and class reweighting."
    decisive_challenge_claim: "If this family is real, it should win the extreme-polarity holdout by sharpening the cleanest negative and positive boundaries."
    resource_class: "cpu"
    funding:
      initial_credits: 8
    cheap_probes:
      - name: "linearsvc_seed"
        description: "Swap logistic regression for a linear margin model."
        config_patch:
          model:
            type: "linearsvc"
            C: 1.0
      - name: "nb_seed"
        description: "Try multinomial Naive Bayes as a calibration-light baseline."
        config_patch:
          model:
            type: "nb"
            alpha: 0.7
    mutation_policy:
      axes:
        - path: "model.C"
          values: [0.5, 1.0, 2.0]
        - path: "model.class_weight"
          values: [null, "balanced"]
    crossover_policy:
      enabled: false
      compatible_families: []
      config_patch: {}
    audit:
      invalid_fast_margin: 0.03
      near_miss_margin: 0.015
    frame_break:
      plateau_window: 3
      min_remaining_probes: 0

  fusion_frontier:
    description: "Combines the best representation and classifier winners, then optionally calibrates them."
    scientific_rationale: "Representation and classifier improvements often stack; calibration only matters once the frontier is worth stabilizing."
    decisive_challenge_claim: "If this family is real, it should own both held-out challenges at once rather than only nudging the search split."
    resource_class: "cpu"
    funding:
      initial_credits: 4
    cheap_probes: []
    mutation_policy:
      axes: []
    crossover_policy:
      enabled: true
      compatible_families:
        - text_representation
        - classifier_search
      config_patch:
        calibration:
          enabled: true
          method: "sigmoid"
    audit:
      invalid_fast_margin: 0.03
      near_miss_margin: 0.015
    frame_break:
      plateau_window: 2
      min_remaining_probes: 0
