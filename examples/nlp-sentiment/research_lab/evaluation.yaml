mode: "external_consistent"

search_eval:
  path: "metrics.search.primary_metric"
  direction: "maximize"

selection_eval:
  path: "metrics.selection.primary_metric"
  direction: "maximize"

final_eval:
  enabled: true
  path: "metrics.final.primary_metric"
  direction: "maximize"

prediction_tests:
  - name: "extreme_polarity_holdout"
    description: "Held-out polarity extremes across the selection and final slices."
    path: "metrics.challenges.extreme_polarity.primary_metric"
    direction: "maximize"
    decisive: true
  - name: "mixed_signal_holdout"
    description: "Held-out mixed-signal language containing words like still, mostly, or acceptable."
    path: "metrics.challenges.mixed_signal.primary_metric"
    direction: "maximize"
    decisive: true

consistency:
  fixed_seed: 1337
  fixed_split_id: "sentiment_toy_v1"
  sealed_eval: null

rerun_policy:
  min_reruns_for_promotion: 2
  max_relative_std: 0.08
  suspicious_improvement_margin: 0.01
  invalid_fast_margin: 0.02
