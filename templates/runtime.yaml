checkpoint_interval: 12

workers:
  pools:
    - resource_class: "cpu"
      slots: 2
      lease_timeout_seconds: 1800
      heartbeat_timeout_seconds: 900

selection:
  crossover_probability: 0.2
  max_concurrent_per_lineage: 3
  elite_archive:
    global_top_k: 20
    family_top_k: 3

funding:
  dispatch_cost: 1
  promote_credit: 3
  stable_credit: 1
  novelty_credit: 1
  prediction_credit: 2

plateau:
  window: 6
  min_delta: 0.005
