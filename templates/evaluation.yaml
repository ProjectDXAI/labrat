mode: "external_consistent"

search_eval:
  path: "metrics.search.primary_metric"
  direction: "maximize"

selection_eval:
  path: "metrics.selection.primary_metric"
  direction: "maximize"

final_eval:
  enabled: true
  path: "metrics.final.primary_metric"
  direction: "maximize"

prediction_tests:
  - name: "LABRAT_PLACEHOLDER_decisive_challenge"
    description: "LABRAT_PLACEHOLDER: a held-out challenge that is not directly optimized by the local hill-climb."
    path: "metrics.challenges.LABRAT_PLACEHOLDER_decisive.primary_metric"
    direction: "maximize"
    decisive: true

consistency:
  fixed_seed: 1337
  fixed_split_id: "LABRAT_PLACEHOLDER_split"
  sealed_eval: null

rerun_policy:
  min_reruns_for_promotion: 2
  max_relative_std: 0.05
  suspicious_improvement_margin: 0.02
  invalid_fast_margin: 0.02
