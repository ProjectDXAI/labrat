# labrat vNext family spec

mission: "LABRAT_PLACEHOLDER: replace with the goal, baseline metric, and target."

production_baseline:
  experiment_id: "LABRAT_PLACEHOLDER_baseline"
  description: "LABRAT_PLACEHOLDER: current production baseline"
  resource_class: "cpu"
  config:
    model:
      type: "LABRAT_PLACEHOLDER_model"
    data:
      dataset: "LABRAT_PLACEHOLDER_dataset"
    training:
      seed: 1337
  seed_metrics:
    search_eval: 0.0
    selection_eval: 0.0
    final_eval: 0.0

families:
  cheap_probe_family:
    description: "LABRAT_PLACEHOLDER: low-cost orthogonal probes against the baseline"
    scientific_rationale: "LABRAT_PLACEHOLDER: why these probes matter before deeper search"
    resource_class: "cpu"
    funding:
      initial_credits: 6
    cheap_probes:
      - name: "probe_one"
        description: "LABRAT_PLACEHOLDER probe"
        config_patch:
          probe:
            name: "LABRAT_PLACEHOLDER_probe"
    mutation_policy:
      axes:
        - path: "model.type"
          values:
            - "LABRAT_PLACEHOLDER_model_a"
            - "LABRAT_PLACEHOLDER_model_b"
    crossover_policy:
      enabled: false
      compatible_families: []
      config_patch: {}
    audit:
      invalid_fast_margin: 0.03
      near_miss_margin: 0.015
    frame_break:
      plateau_window: 4
      min_remaining_probes: 0

  mutation_family:
    description: "LABRAT_PLACEHOLDER: a deeper family with real local exploitation"
    scientific_rationale: "LABRAT_PLACEHOLDER: why mutations here could beat the baseline"
    resource_class: "cpu"
    funding:
      initial_credits: 8
    cheap_probes:
      - name: "seed_variant"
        description: "LABRAT_PLACEHOLDER seed"
        config_patch:
          model:
            variant: "LABRAT_PLACEHOLDER_seed"
    mutation_policy:
      axes:
        - path: "training.learning_rate"
          values: [0.001, 0.003, 0.01]
        - path: "training.regularization"
          values: [0.0, 0.1, 0.2]
    crossover_policy:
      enabled: false
      compatible_families: []
      config_patch: {}
    audit:
      invalid_fast_margin: 0.03
      near_miss_margin: 0.015
    frame_break:
      plateau_window: 4
      min_remaining_probes: 0

  crossover_family:
    description: "LABRAT_PLACEHOLDER: combines complementary winners from other families"
    scientific_rationale: "LABRAT_PLACEHOLDER: why the families should compose"
    resource_class: "cpu"
    funding:
      initial_credits: 4
    cheap_probes: []
    mutation_policy:
      axes: []
    crossover_policy:
      enabled: true
      compatible_families:
        - cheap_probe_family
        - mutation_family
      config_patch:
        crossover:
          enabled: true
    audit:
      invalid_fast_margin: 0.03
      near_miss_margin: 0.015
    frame_break:
      plateau_window: 3
      min_remaining_probes: 0
